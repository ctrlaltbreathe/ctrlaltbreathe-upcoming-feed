name: Update upcoming sessions feed

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-feed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build public feed
        env:
          BOOKWHEN_API_TOKEN: ${{ secrets.BOOKWHEN_API_TOKEN }}
        run: python work/build_upcoming_sessions_feed.py --output upcoming-sessions.json

      - name: Commit feed update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add upcoming-sessions.json
          git diff --cached --quiet || git commit -m "Update upcoming sessions feed"
          git push
